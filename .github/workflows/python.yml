name: Python checks

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile script
        run: python -m py_compile Kru-Toffy/codex-python.py

      - name: Show CLI help
        run: python Kru-Toffy/codex-python.py --help

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
