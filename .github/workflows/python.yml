name: Python checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile Python files
        run: python -m py_compile Kru-Toffy/codex-python.py tests/test_codex_python.py

      - name: Show CLI help
        run: python Kru-Toffy/codex-python.py --help

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
