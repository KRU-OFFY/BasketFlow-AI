name: BasketFlow AI CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-publishable-key
      AI_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - name: Package verified source for Vercel preview
        uses: actions/upload-artifact@v4
        with:
          name: basketflow-vercel-source
          path: |
            .
            !.git/**
            !node_modules/**
            !.next/**
            !typecheck.log
          include-hidden-files: true
          compression-level: 9
          retention-days: 1
